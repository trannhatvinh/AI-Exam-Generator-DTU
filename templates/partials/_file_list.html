{% if files %}
<ul class="list-group mb-3">
    {% for f in files %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ f }}</span>
        <button class="btn btn-danger btn-sm btn-delete-file" data-topic="{{ current_topic }}" data-filename="{{ f }}">
            <i class="fa fa-trash"></i> Xóa
        </button>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="text-muted">Chưa có file nào trong chủ đề này.</div>
{% endif %}
